<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designação de Funções - Salão do Reino</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-global: #FFFFFF; 
            --card-white: #E6E6E6;
            --text-dark: #2C2A1E; 
            --text-muted: #555555;
            --input-bg: #FFFFFF; 
            --border-color: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, "Roboto" , Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-dark);
            padding: 18px 12px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .seletor-semana {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            background-color: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 10px 18px;
        }

        .seta-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-dark);
            padding: 0 10px;
            user-select: none;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .seta-btn:active {
            transform: scale(0.85);
        }

        .seta-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .semana-titulo {
            font-family: "Lato", sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text-dark);
            text-align: center;
            flex: 1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 9px; 
            width: 100%;
            max-width: 800px;
        }

        .card-funcao {
            background-color: var(--card-white);
            border-radius: 28px; 
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(44, 42, 30, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px; 
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 20px; 
            font-weight: bold;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exibicao-nome {
            width: 100%;
            padding: 8px; 
            background-color: var(--input-bg);
            border-radius: 18px; 
            font-size: 18px; 
            color: var(--text-dark);
            font-weight: bold;
            min-height: 48px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .exibicao-nome.vazio {
            color: var(--text-muted);
            font-style: italic;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="seletor-semana">
        <button class="seta-btn" id="btn-anterior" onclick="navegar(-1)">◀</button>
        <div class="semana-titulo" id="label-semana">Carregando dados...</div>
        <button class="seta-btn" id="btn-proxima" onclick="navegar(1)">▶</button>
    </div>
    
    <div class="cards-grid">
        
        <div class="card-funcao">
            <h2 class="card-title">🎼 Áudio e Vídeo</h2>
            <div class="exibicao-nome" id="txt-audio"></div>
        </div>

        <div class="card-funcao">
            <h2 class="card-title">🎙️ Palco</h2>
            <div class="exibicao-nome" id="txt-palco"></div>
        </div>

        <div class="card-funcao">
            <h2 class="card-title">🎤 Microfone Volante</h2>
            <div class="exibicao-nome" id="txt-v1"></div>
            <div class="exibicao-nome" id="txt-v2"></div>
        </div>

        <div class="card-funcao">
            <h2 class="card-title">☝🏽 Indicador Interno</h2>
            <div class="exibicao-nome" id="txt-ind-interno"></div>
        </div>

        <div class="card-funcao">
            <h2 class="card-title">🚪 Indicador Externo</h2>
            <div class="exibicao-nome" id="txt-ind-externo"></div>
        </div>

    </div>

    <script>
        // O SEU LINK DA PLANILHA INSERIDO AQUI:
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBuS_Qe2LkVH7QEPbSvoFn50e7I71Waljbuk8b2UR1wxGkYZMoeEZUy7Moy1DF4pMfRlRsn0tyNDu4/pub?output=csv";

        let bancoDeDados = [];
        let indiceAtual = 0;
        const idsCampos = ['audio', 'palco', 'v1', 'v2', 'ind-interno', 'ind-externo'];

        // Função que busca os dados da planilha e converte o CSV para Objeto
        async function carregarDadosDaPlanilha() {
            try {
                const resposta = await fetch(URL_PLANILHA);
                const textoCSV = await resposta.text();
                
                // Quebra as linhas do CSV
                const linhas = textoCSV.split(/\r?\n/);
                if (linhas.length < 2) return;

                // Captura a primeira linha (cabeçalhos) e limpa espaços
                const cabecalhos = linhas[0].split(',').map(c => c.trim().toLowerCase());

                bancoDeDados = [];

                // Processa cada linha de dados
                for (let i = 1; i < linhas.length; i++) {
                    if (!linhas[i]) continue;
                    
                    const colunas = linhas[i].split(',');
                    let dadosSemana = {};

                    cabecalhos.forEach((cabecalho, index) => {
                        dadosSemana[cabecalho] = colunas[index] ? colunas[index].trim() : "";
                    });

                    if (dadosSemana.semana) {
                        bancoDeDados.push(dadosSemana);
                    }
                }

                // Exibe os dados na tela
                atualizarTela();

            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
                document.getElementById('label-semana').innerText = "Erro ao carregar dados";
            }
        }

        function atualizarTela() {
            if (bancoDeDados.length === 0) {
                document.getElementById('label-semana').innerText = "Nenhuma escala encontrada";
                return;
            }

            const dadosDaSemana = bancoDeDados[indiceAtual];

            // Atualiza o topo com o texto da coluna 'semana' da planilha
            document.getElementById('label-semana').innerText = dadosDaSemana.semana;

            // Alimenta os cards baseado nos cabeçalhos da planilha
            idsCampos.forEach(id => {
                const elemento = document.getElementById(`txt-${id}`);
                const nome = dadosDaSemana[id];

                if (nome && nome.trim() !== "") {
                    elemento.innerText = nome;
                    elemento.classList.remove('vazio');
                } else {
                    elemento.innerText = "Não designado";
                    elemento.classList.add('vazio');
                }
            });

            // Gerencia os botões de avançar/voltar
            document.getElementById('btn-anterior').disabled = (indiceAtual === 0);
            document.getElementById('btn-proxima').disabled = (indiceAtual === bancoDeDados.length - 1);
        }

        function navegar(direcao) {
            const novoIndice = indiceAtual + direcao;
            if (novoIndice >= 0 && novoIndice < bancoDeDados.length) {
                indiceAtual = novoIndice;
                atualizarTela();
            }
        }

        // Executa a busca automática assim que a página abre
        window.onload = function() {
            carregarDadosDaPlanilha();
        };
    </script>
</body>
</html>
